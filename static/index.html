<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AirOps → OpenAI Proxy</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2e3a;--txt:#e4e6eb;--mut:#8b8f9a;--acc:#4f8cff;--ok:#22c55e;--err:#ef4444;--warn:#f59e0b}
*{box-sizing:border-box}body{font-family:-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--txt);padding:20px;max-width:900px;margin:auto}h1{font-size:20px;margin:0 0 4px}h2{font-size:14px;margin:16px 0 8px;color:var(--mut)}.sub,.muted{color:var(--mut);font-size:12px}.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin:10px 0}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}input,select{background:#0b0d13;border:1px solid var(--border);border-radius:6px;color:var(--txt);padding:7px 10px;font-size:13px}button{background:var(--acc);color:#fff;border:0;border-radius:6px;padding:8px 16px;cursor:pointer}button.ghost{background:transparent;border:1px solid var(--border)}button.danger{background:var(--err);padding:4px 10px}table{width:100%;border-collapse:collapse;font-size:12px}th,td{padding:7px 5px;text-align:left;border-bottom:1px solid var(--border)}th{color:var(--mut)}.tag{display:inline-block;padding:1px 7px;border-radius:10px;cursor:pointer}.tag.on{background:#16331f;color:var(--ok)}.tag.off{background:#2a1414;color:var(--err)}.mono{font-family:Consolas,monospace;font-size:11px}pre{background:#0b0d13;border:1px solid var(--border);border-radius:6px;padding:10px;overflow:auto;max-height:260px;white-space:pre-wrap}.toast{position:fixed;top:16px;right:16px;padding:10px 16px;border-radius:6px;opacity:0}.toast.show{opacity:1}.toast.ok{background:var(--ok)}.toast.err{background:var(--err)}.ok-text{color:var(--ok)}.err-text{color:var(--err)}[contenteditable][data-placeholder]:empty::before{content:attr(data-placeholder);color:var(--mut)}
</style>
</head>
<body>
<h1>AirOps → OpenAI Proxy</h1>
<div class="sub">OpenAI 兼容 API · Base URL: <span class="mono" id="baseurl"></span></div>
<div class="card"><div class="row"><input type="password" id="proxyToken" placeholder="代理令牌（如已配置）" style="flex:1"><button class="ghost" id="applyToken">应用令牌</button><span id="authstat" class="muted"></span></div></div>
<div class="card"><h2 style="margin-top:0">添加 Workflow</h2><div class="row"><button class="ghost" id="btnLoad">拉取我的 Workflows</button><select id="pickapp" style="display:none;flex:1"></select><span id="pickstat" class="muted"></span></div><div id="applist"></div></div>
<h2>已配置的 Workflow（<span id="modelcount">0</span>）</h2>
<div class="card"><table id="models"><tr><th>别名</th><th>workflow</th><th>input</th><th>模式</th><th>output</th><th>启用</th><th></th></tr></table><div class="muted" id="emptyhint">还没有配置。</div></div>
<h2>测试</h2><div class="card"><div class="row"><select id="t_model"><option value="">选 workflow</option></select><input id="t_input" value="hello" style="flex:2"><button id="btnTest">测试</button><span id="keystat" class="muted"></span></div><pre id="testout" style="display:none"></pre></div>
<h2>接入方式</h2><div class="card"><pre id="curl"></pre></div><div class="toast" id="toast"></div>
<script>
let token=sessionStorage.getItem('proxy_token')||'';
let remoteApps=[];
let publicModel='airops/claude-4-6-opus';
let saveTimer=null;
let saveWaiters=[];
const $=id=>document.getElementById(id);
const clear=element=>element.replaceChildren();
function node(tag,text='',className=''){const element=document.createElement(tag);element.textContent=text;if(className)element.className=className;return element}
function addOption(select,value,text){const option=node('option',text);option.value=value;select.append(option)}
function headers(){const result={'Content-Type':'application/json'};if(token)result['X-Proxy-Token']=token;return result}
function toast(message,ok=true){const target=$('toast');target.textContent=message;target.className='toast show '+(ok?'ok':'err');setTimeout(()=>target.className='toast',2000)}
async function api(path,method='GET',body){const options={method,headers:headers()};if(body!==undefined)options.body=JSON.stringify(body);const response=await fetch(path,options);const text=await response.text();let payload;try{payload=text?JSON.parse(text):null}catch{payload=text}if(!response.ok){const detail=payload?.detail??payload;throw new Error(`${response.status} ${typeof detail==='string'?detail:JSON.stringify(detail)}`)}return payload}
function slug(value){return String(value||'').toLowerCase().replace(/[^a-z0-9-]+/g,'-').replace(/^-+|-+$/g,'')||'wf'}
function uniqueName(name){const used=new Set(collectModels().map(model=>model.name));if(!used.has(name))return name;let index=2;while(used.has(`${name}-${index}`))index++;return `${name}-${index}`}

async function applyToken(){token=$('proxyToken').value.trim();if(token)sessionStorage.setItem('proxy_token',token);else sessionStorage.removeItem('proxy_token');await loadAll()}
async function loadApps(){const button=$('btnLoad');button.disabled=true;button.textContent='拉取中…';try{remoteApps=await api('/api/apps');const select=$('pickapp');clear(select);addOption(select,'','↓ 选一个 workflow 自动配置');for(const app of remoteApps)addOption(select,`${app.uuid}|${app.key_index}`,`${app.name} [key${app.key_index}:${app.key_preview}]`);select.style.display='block';$('pickstat').textContent=`${remoteApps.length} 个（跨 ${new Set(remoteApps.map(app=>app.key_index)).size} 个 workspace）`;const details=node('details');const summary=node('summary','展开列表');const table=node('table');const header=node('tr');for(const title of ['name','workspace','key','uuid'])header.append(node('th',title));table.append(header);for(const app of remoteApps){const row=node('tr');row.append(node('td',String(app.name||'')),node('td',`ws${app.workspace_id??''}`,'muted'),node('td',`key${app.key_index}:${app.key_preview}`,'mono'),node('td',`${String(app.uuid||'').slice(0,12)}…`,'mono'));table.append(row)}details.append(summary,table);$('applist').replaceChildren(details);button.textContent='重新拉取'}catch(error){toast(error.message,false);button.textContent='拉取我的 Workflows'}finally{button.disabled=false}}
async function pickApp(){const raw=$('pickapp').value;if(!raw)return;const [uuid,keyText]=raw.split('|');const keyIndex=Number.parseInt(keyText,10);const remote=remoteApps.find(app=>app.uuid===uuid&&app.key_index===keyIndex);if(!remote)return;const status=$('pickstat');status.textContent=`正在读取 schema（key${keyIndex}）…`;try{const config=await api('/api/autoconfig','POST',{app_uuid:uuid,key_index:keyIndex,key_id:remote.key_id});config.name=uniqueName(config.name);addModelRow(config);const saved=await autoSave();status.textContent=saved?`✓ 已配置 ${config.llm_model||''}`:'✗ 已添加但保存失败';status.className=saved?'ok-text':'err-text';toast(saved?`已添加: ${config.name}`:'配置未保存',saved);if(config.probe_log?.length){$('testout').style.display='block';$('testout').textContent='探测日志:\n'+JSON.stringify(config.probe_log,null,2)}}catch(error){status.textContent='✗ '+error.message.slice(0,120);status.className='err-text';toast('自动配置失败，请手动填写输入字段',false);addModelRow({name:uniqueName(slug(remote.name)),app_uuid:uuid,app_name:remote.name,input_field:'',output_field:'',input_mode:'sillytavern',enabled:true,key_index:keyIndex,key_id:remote.key_id})}$('pickapp').value=''}

function collectModels(){return [...$('models').querySelectorAll('tr[data-model]')].map(row=>{const cells=row.querySelectorAll('td');const m=row._model;const multi=Array.isArray(m.input_mappings)&&m.input_mappings.length>0;const result={name:cells[0].textContent.trim(),app_uuid:row.dataset.uuid,input_field:multi?'':cells[2].textContent.trim(),output_field:cells[4].textContent.trim(),input_mode:m.input_mode||'sillytavern',enabled:cells[5].querySelector('.tag').classList.contains('on'),key_index:Number.parseInt(row.dataset.ki,10),key_id:row.dataset.kid||''};if(multi)result.input_mappings=m.input_mappings.map(x=>({...x}));if(m.request_mappings&&Object.keys(m.request_mappings).length)result.request_mappings={...m.request_mappings};return result})}
function editableCell(text,placeholder){const cell=node('td',text||'');cell.contentEditable='true';cell.dataset.placeholder=placeholder;return cell}
function ensureMappingsArr(stored){if(!Array.isArray(stored.input_mappings))stored.input_mappings=[];return stored.input_mappings}
function mappingRow(m,stored){const row=node('div');row.style.cssText='display:flex;gap:4px;margin:2px 0;align-items:center';const role=node('select');for(const r of ['system','user','assistant','*']){const o=node('option',r==='*'?'*':r);o.value=r;role.append(o)}role.value=m.role||'user';role.onchange=()=>{m.role=role.value;void autoSave()};const field=node('input');field.value=m.field||'';field.placeholder='字段';field.style.cssText='flex:1;min-width:50px;padding:4px 6px';field.onblur=()=>{m.field=field.value.trim();void autoSave()};const mode=node('select');for(const mo of ['last','concat','join']){const o=node('option',mo);o.value=mo;mode.append(o)}mode.value=m.mode||'last';mode.onchange=()=>{m.mode=mode.value;void autoSave()};const del=node('button','×','danger');del.style.cssText='padding:2px 6px';del.onclick=()=>{const arr=ensureMappingsArr(stored);const i=arr.indexOf(m);if(i>=0)arr.splice(i,1);renderMappingsCell(inputCellRef,stored);void autoSave();refreshTestSelect();refreshCurl()};row.append(role,field,mode,del);return row}
let inputCellRef=null
function renderMappingsCell(cell,stored){inputCellRef=cell;cell.replaceChildren();const arr=ensureMappingsArr(stored);const list=node('div');list.style.cssText='display:flex;flex-direction:column';for(const m of arr)list.append(mappingRow(m,stored));const add=node('button','+ 映射','ghost');add.style.cssText='padding:3px 8px;margin-top:2px';add.onclick=()=>{arr.push({role:'user',field:'',mode:'last'});renderMappingsCell(cell,stored);void autoSave()};cell.append(list,add)}
function addModelRow(model){
  const stored={...model};delete stored.probe_log;delete stored.output_sample;
  const row=node('tr');row.dataset.model='1';row.dataset.uuid=stored.app_uuid;row.dataset.ki=stored.key_index??0;row.dataset.kid=stored.key_id||'';row._model=stored;
  const nameCell=editableCell(stored.name,'别名');
  const workflowCell=node('td','','mono');workflowCell.title=String(stored.app_name||'');workflowCell.append(document.createTextNode(String(stored.app_name||stored.app_uuid||'').slice(0,12)+' '),node('span',stored.key_index!==undefined?`key${stored.key_index}`:'','muted'));
  const inputCell=node('td');const multi=Array.isArray(stored.input_mappings)&&stored.input_mappings.length>0;
  if(multi){inputCell.style.cssText='padding:4px';renderMappingsCell(inputCell,stored)}else{inputCell.contentEditable='true';inputCell.dataset.placeholder='必填';inputCell.textContent=stored.input_field||'';inputCell.onblur=()=>{stored.input_field=inputCell.textContent.trim();void autoSave();refreshTestSelect();refreshCurl()}}
  const modeCell=node('td');const mode=node('select');
  for(const value of ['sillytavern','concat','last_user'])addOption(mode,value,value==='sillytavern'?'酒馆保序':value);
  mode.value=stored.input_mode||'sillytavern';mode.disabled=multi;mode.title=multi?'多字段 role 映射覆盖此模式':'保留酒馆 Prompt Manager 的原始消息顺序';mode.onchange=()=>{stored.input_mode=mode.value;void autoSave()};modeCell.append(mode);
  if(stored.request_mappings&&Object.keys(stored.request_mappings).length)modeCell.append(node('div',`参数×${Object.keys(stored.request_mappings).length}`,'muted'));
  const outputCell=editableCell(stored.output_field,'auto');
  const enabledCell=node('td');const tag=node('span',stored.enabled===false?'OFF':'ON',`tag ${stored.enabled===false?'off':'on'}`);tag.onclick=()=>toggleModel(tag);enabledCell.append(tag);
  const actionCell=node('td');const remove=node('button','删','danger');remove.onclick=()=>deleteRow(remove);actionCell.append(remove);
  row.append(nameCell,workflowCell,inputCell,modeCell,outputCell,enabledCell,actionCell);$('models').append(row);
  for(const cell of [nameCell,outputCell])cell.onblur=()=>{void autoSave();refreshTestSelect();refreshCurl()};updateEmpty();refreshTestSelect();refreshCurl()
}
function toggleModel(tag){const enabled=tag.classList.contains('on');tag.className=`tag ${enabled?'off':'on'}`;tag.textContent=enabled?'OFF':'ON';void autoSave();refreshTestSelect();refreshCurl()}
function deleteRow(button){button.closest('tr').remove();updateEmpty();refreshTestSelect();refreshCurl();void autoSave()}
function updateEmpty(){const count=collectModels().length;$('emptyhint').style.display=count?'none':'block';$('modelcount').textContent=count}
function refreshTestSelect(){const select=$('t_model');clear(select);addOption(select,'','选 workflow');for(const model of collectModels())if(model.enabled)addOption(select,model.name,model.name)}
function autoSave(){if(saveTimer)clearTimeout(saveTimer);return new Promise(resolve=>{saveWaiters.push(resolve);saveTimer=setTimeout(async()=>{const waiters=saveWaiters;saveWaiters=[];saveTimer=null;const models=collectModels();let ok=false;try{await api('/api/config','POST',{models});ok=true;$('modelcount').textContent=models.length}catch(error){toast('保存失败: '+error.message,false)}for(const done of waiters)done(ok)},500)})}
async function testModel(){const name=$('t_model').value;const input=$('t_input').value;if(!name){toast('选 workflow',false);return}const model=collectModels().find(item=>item.name===name);const output=$('testout');output.style.display='block';output.textContent='运行中…';try{const result=await api('/api/test','POST',{model_config:model,input});output.textContent=`status: ${result.status}\n\n${result.text}`}catch(error){output.textContent=error.message;toast(error.message,false)}}
function refreshCurl(){const base=location.origin;const apiKey=token?'$PROXY_TOKEN':'sk-any';const auth=token?'-H "X-Proxy-Token: $PROXY_TOKEN" ':'';$('curl').textContent=`# OpenAI Python SDK\nfrom openai import OpenAI\nclient = OpenAI(base_url="${base}/v1", api_key="${apiKey}")\nr = client.chat.completions.create(model="${publicModel}", messages=[{"role":"user","content":"hi"}])\nprint(r.choices[0].message.content)\n\n# curl\ncurl -X POST ${base}/v1/chat/completions ${auth}-H "Content-Type: application/json" -d '{"model":"${publicModel}","messages":[{"role":"user","content":"hello"}]}'`}
async function loadConfig(){try{const config=await api('/api/config');for(const row of [...$('models').querySelectorAll('tr[data-model]')])row.remove();for(const model of config.models||[])addModelRow(model);updateEmpty();$('authstat').textContent='已连接';$('authstat').className='ok-text'}catch(error){$('authstat').textContent=error.message;$('authstat').className='err-text';toast('配置加载失败: '+error.message,false)}}
async function loadPublicModel(){try{const result=await api('/v1/models');if(result.data?.[0]?.id)publicModel=result.data[0].id;refreshCurl()}catch(error){$('authstat').textContent=error.message;$('authstat').className='err-text'}}
async function loadKeyStatus(){try{const result=await api('/api/keys');const colors={ok:'var(--ok)',cooling:'var(--warn)',dead:'var(--err)'};const target=$('keystat');clear(target);for(const key of result.keys){const span=node('span',`${key.key}:${key.status} `);span.style.color=colors[key.status]||'var(--mut)';target.append(span)}if(result.keys.some(key=>key.status!=='ok'))setTimeout(loadKeyStatus,3000)}catch(error){$('keystat').textContent=error.message}}
async function loadAll(){await Promise.all([loadConfig(),loadPublicModel(),loadKeyStatus()])}
$('applyToken').onclick=applyToken;$('btnLoad').onclick=loadApps;$('pickapp').onchange=pickApp;$('btnTest').onclick=testModel;$('baseurl').textContent=location.origin+'/v1';$('proxyToken').value=token;refreshCurl();void loadAll();
</script>
</body>
</html>
